name: Run Tests

on:
  push:
    branches: [main]
  
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: "3.9"
    - name: Install dependencies
      run: |
        cd backend
        pip install -r requirements.txt
        pip install pytest httpx
    - name: Run Tests
      run: |
        cd backend
        python -m pytest tests/test_main.py -v